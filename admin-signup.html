<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<HTML>
<HEAD>
    <META HTTP-EQUIV="Content-Language" CONTENT="en-us">
    <META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=ISO-8859-1">
    <META NAME="viewport" CONTENT="width=device-width, initial-scale=1.0">
    <LINK REL="StyleSheet" TYPE="text/css" HREF="./css/crsis.css">
    <LINK REL="StyleSheet" TYPE="text/css" HREF="./css/auth.css">
    <TITLE>UPV CRSIS - Admin Sign Up</TITLE>
</HEAD>
<BODY class="body auth-body">
    <TABLE class="crsistable auth-shell">
        <tr background="./images/crsh_02.jpg">
            <td class="maintd1" align="left"><img border="0" src="./images/crsh_01.jpg" width="336" height="125"></td>
            <td colspan="2" class="maintd2"><img border="0" src="./images/crsh_03.jpg" width="500" height="125"></td>
        </tr>
        <tr>
            <td align="left"><img border="0" src="./images/crsh_04.jpg" width="336" height="25"></td>
            <td colspan="2" class="maintd4">
                <span class="menu">
                    <a class="menu" href="./index.html"><u>Home</u></a> &nbsp;&nbsp;&nbsp;&nbsp; . &nbsp;&nbsp;&nbsp;&nbsp;
                    <a class="menu" href="./admin-signup.html"><u>Admin Sign Up</u></a> &nbsp;&nbsp;&nbsp;&nbsp; . &nbsp;&nbsp;&nbsp;&nbsp;
                    <a class="menu" href="./faculty-signup.html"><u>Faculty Sign Up</u></a> &nbsp;&nbsp;&nbsp;&nbsp; . &nbsp;&nbsp;&nbsp;&nbsp;
                    <a class="menu" href="./student-signup.html"><u>Student Sign Up</u></a>
                </span>
            </td>
        </tr>
    </TABLE>

    <div class="auth-shell">
        <div class="auth-panel signup-chaos auth-chaos layout-e">
            <span class="role-stamp">Admin Sign-up</span>
            <p class="auth-title">CRS</p>
            <p class="auth-subtitle">CRS LOG-IN.</p>

            <div class="auth-grid">
                <div class="auth-card">
                    <form data-auth-form data-role="admin" data-mode="signup" data-next="./admin-login.html">
                        <div class="fan-panel" data-fan-login>
                            <div class="fan-head">
                                <div>
                                    <p class="auth-helper">GL </p>
                                </div>
                                <div class="fan-meter">
                                    <input type="range" min="5" max="100" value="61" data-fan-speed>
                                    <div class="fan-meter-value">Wind speed: <span data-fan-speed-label></span></div>
                                </div>
                            </div>

                            <div class="fan-fields">
                                <div class="fan-field" data-fan-field="adminId">
                                    <button class="mode-button" type="button" data-select-field="adminId">Edit Admin ID</button>
                                    <input class="auth-input fan-value" type="text" name="adminId" required readonly>
                                </div>
                                <div class="fan-field" data-fan-field="displayName">
                                    <button class="mode-button" type="button" data-select-field="displayName">Edit Name</button>
                                    <input class="auth-input fan-value" type="text" name="displayName" required readonly>
                                </div>
                            </div>

                            <div class="fan-keyboard-shell hostile" data-fan-shell>
                                <div class="fan-gust left"><span></span></div>
                                <div class="fan-gust right"><span></span></div>
                                <div class="fan-gust bottom"><span></span></div>
                                <div class="fan-swirl"></div>
                                <div class="fan-keyboard" data-fan-keyboard>
                                    <button class="fan-key" type="button" data-fan-key="A">A</button><button class="fan-key" type="button" data-fan-key="B">B</button><button class="fan-key" type="button" data-fan-key="C">C</button><button class="fan-key" type="button" data-fan-key="D">D</button><button class="fan-key" type="button" data-fan-key="E">E</button><button class="fan-key" type="button" data-fan-key="F">F</button>
                                    <button class="fan-key" type="button" data-fan-key="G">G</button><button class="fan-key" type="button" data-fan-key="H">H</button><button class="fan-key" type="button" data-fan-key="I">I</button><button class="fan-key" type="button" data-fan-key="J">J</button><button class="fan-key" type="button" data-fan-key="K">K</button><button class="fan-key" type="button" data-fan-key="L">L</button>
                                    <button class="fan-key" type="button" data-fan-key="M">M</button><button class="fan-key" type="button" data-fan-key="N">N</button><button class="fan-key" type="button" data-fan-key="O">O</button><button class="fan-key" type="button" data-fan-key="P">P</button><button class="fan-key" type="button" data-fan-key="Q">Q</button><button class="fan-key" type="button" data-fan-key="R">R</button>
                                    <button class="fan-key" type="button" data-fan-key="S">S</button><button class="fan-key" type="button" data-fan-key="T">T</button><button class="fan-key" type="button" data-fan-key="U">U</button><button class="fan-key" type="button" data-fan-key="V">V</button><button class="fan-key" type="button" data-fan-key="W">W</button><button class="fan-key" type="button" data-fan-key="X">X</button>
                                    <button class="fan-key" type="button" data-fan-key="Y">Y</button><button class="fan-key" type="button" data-fan-key="Z">Z</button><button class="fan-key" type="button" data-fan-key="0">0</button><button class="fan-key" type="button" data-fan-key="1">1</button><button class="fan-key" type="button" data-fan-key="2">2</button><button class="fan-key" type="button" data-fan-key="3">3</button>
                                    <button class="fan-key" type="button" data-fan-key="4">4</button><button class="fan-key" type="button" data-fan-key="5">5</button><button class="fan-key" type="button" data-fan-key="6">6</button><button class="fan-key" type="button" data-fan-key="7">7</button><button class="fan-key" type="button" data-fan-key="8">8</button><button class="fan-key" type="button" data-fan-key="9">9</button>
                                    <button class="fan-key wide" type="button" data-fan-key="space">SPACE</button><button class="fan-key" type="button" data-fan-key="-">-</button><button class="fan-key" type="button" data-fan-key=".">.</button><button class="fan-key wide" type="button" data-fan-key="backspace">BACK</button><button class="fan-key wide" type="button" data-fan-key="clear">CLEAR</button>
                                </div>
                            </div>
                        </div>

                        <div class="scientific-picker" data-scientific-picker>
                            <p class="scientific-picker-title">Date of Birth</p>
                            <div class="scientific-grid">
                                <div class="science-cell" data-science-part="month">
                                    <label>Month Mantissa</label>
                                    <input type="range" min="0.10" max="12.00" step="0.10" value="9.00" data-mantissa>
                                    <select data-exponent>
                                        <option value="0">x 10^0</option>
                                        <option value="1">x 10^1</option>
                                    </select>
                                    <div class="science-formula" data-formula></div>
                                    <div class="science-value" data-value></div>
                                </div>
                                <div class="science-cell" data-science-part="day">
                                    <label>Day Mantissa</label>
                                    <input type="range" min="0.10" max="31.00" step="0.10" value="1.70" data-mantissa>
                                    <select data-exponent>
                                        <option value="0">x 10^0</option>
                                        <option value="1" selected>x 10^1</option>
                                    </select>
                                    <div class="science-formula" data-formula></div>
                                    <div class="science-value" data-value></div>
                                </div>
                                <div class="science-cell" data-science-part="year">
                                    <label>Year Mantissa</label>
                                    <input type="range" min="1.80" max="2.10" step="0.01" value="2.00" data-mantissa>
                                    <select data-exponent>
                                        <option value="2">x 10^2</option>
                                        <option value="3" selected>x 10^3</option>
                                        <option value="4">x 10^4</option>
                                    </select>
                                    <div class="science-formula" data-formula></div>
                                    <div class="science-value" data-value></div>
                                </div>
                            </div>
                            <div class="science-preview" data-birth-preview></div>
                            <input type="hidden" name="birthDate" required data-birth-date-input>
                        </div>

                        <div class="auth-actions">
                            <button class="auth-submit" type="submit">Sign-up my prend</button>
                        </div>
                        <div class="auth-status" data-auth-status></div>
                    </form>

                    <div class="auth-review-box auth-hidden" data-fake-success>
                        <p class="labelleftgreen9B">Registered</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="./js/blackjack.js"></script>
    <script src="./js/auth.js"></script>
</BODY>
</HTML>
